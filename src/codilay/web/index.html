<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodiLay</title>
  <link rel="stylesheet" href="/static/style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Dynamic Syntax Highlighting Theme -->
  <link id="hljs-theme" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script>
    // Prevent Flash of Unstyled Content (FOUC) by setting theme immediately
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('hljs-theme').href = `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github${theme === 'light' ? '' : '-dark'}.min.css`;
    })();
  </script>
</head>

<body>

  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <div>
            <h1><i data-lucide="layers"></i> CodiLay</h1>
            <div class="project-name" id="project-name">Loading...</div>
          </div>
          <button class="header-action-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
            <i data-lucide="sun" id="theme-icon"></i>
          </button>
        </div>
      </div>

      <div class="sidebar-search">
        <div class="search-wrapper">
          <i data-lucide="search"></i>
          <input type="text" id="section-search" placeholder="Search sections...">
        </div>
      </div>

      <div class="sidebar-stats" id="sidebar-stats"></div>

      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="sections">Sections</div>
        <div class="sidebar-tab" data-tab="files">Files</div>
      </div>

      <div class="sidebar-nav" id="sidebar-nav"></div>
    </div>

    <!-- Main content -->
    <div class="main">
      <div class="main-header">
        <div class="view-tabs">
          <button class="view-tab active" data-view="document"><i data-lucide="file-text"></i> Document</button>
          <button class="view-tab" data-view="graph"><i data-lucide="network"></i> Graph</button>
          <button class="view-tab" data-view="diff"><i data-lucide="git-compare"></i> Doc Diff</button>
          <button class="view-tab" data-view="diff-run"><i data-lucide="git-branch"></i> Diff-Run</button>
          <button class="view-tab" data-view="search"><i data-lucide="search"></i> Search</button>
          <button class="view-tab" data-view="team"><i data-lucide="users"></i> Team</button>
          <button class="view-tab" data-view="audit"><i data-lucide="shield"></i> Audit</button>
          <button class="view-tab" data-view="commit-docs"><i data-lucide="git-commit"></i> Commits</button>
          <button class="view-tab" data-view="tools"><i data-lucide="wrench"></i> Tools</button>
        </div>
      </div>
      <div class="main-content" id="main-content">
        <div class="loading">
          <div class="spinner"></div> Loading documentation...
        </div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chat-panel">
      <!-- Resize Handle -->
      <div class="chat-resizer" id="chat-resizer"></div>

      <!-- Toolbar -->
      <div class="chat-toolbar" style="position:relative;">
        <div class="chat-toolbar-left">
          <button class="chat-new-btn" onclick="chatNewConversation()" title="New conversation">
            <i data-lucide="plus"></i> New
          </button>
          <span class="chat-conv-title" id="chat-conv-title">New conversation</span>
        </div>
        <div class="chat-toolbar-right">
          <button class="chat-icon-btn" onclick="chatToggleHistory()" title="Conversation history"><i
              data-lucide="history"></i></button>
          <button class="chat-icon-btn" onclick="chatExport()" title="Export to markdown"><i
              data-lucide="download"></i></button>
          <button class="chat-icon-btn" onclick="toggleChat()" title="Close chat"><i data-lucide="x"></i></button>
        </div>
        <!-- Conversation history dropdown -->
        <div class="chat-conv-dropdown" id="chat-conv-dropdown"></div>
      </div>

      <!-- Memory bar -->
      <div class="chat-memory-bar" id="chat-memory-bar" style="display:none;">
        <span class="mem-dot"></span>
        <span id="chat-memory-text">Memory active</span>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages">
        <!-- Rendered by JS initially -->
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea id="chat-input" placeholder="Ask about the codebase..." rows="1" autocomplete="off"></textarea>
          <div class="chat-input-actions">
            <div class="chat-input-left">
              <button class="chat-mode-btn" id="deep-mode-btn" onclick="chatToggleDeep()"
                title="Deep mode — read source files directly">
                <i data-lucide="search"></i> Deep
              </button>
              <button class="chat-mode-btn" onclick="chatShowMemory()" title="View stored memory">
                <i data-lucide="brain"></i> Memory
              </button>
            </div>
            <div class="chat-input-right">
              <span style="font-size:11px;color:var(--text-muted);opacity:0.6;">Enter to send</span>
              <button class="chat-send-btn" id="chat-send" onclick="sendChat()">
                Send <i data-lucide="send" style="width: 14px; height: 14px;"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat toggle button (when panel is collapsed) -->
  <button class="chat-toggle hidden" id="chat-toggle" onclick="toggleChat()" title="Open codebase chat">
    <i data-lucide="message-square"></i>
  </button>

  <!-- File viewer overlay -->
  <div class="file-viewer-overlay hidden" id="file-viewer-overlay" onclick="closeFileViewer(event)">
    <div class="file-viewer">
      <div class="file-viewer-header">
        <h3 id="file-viewer-title"></h3>
        <button class="file-viewer-close" onclick="closeFileViewer()"><i data-lucide="x"></i></button>
      </div>
      <div class="file-viewer-content">
        <pre><code id="file-viewer-code"></code></pre>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>

</html>
